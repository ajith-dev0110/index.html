<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignIn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <!-- Signin account page -->
<div class="auth-container">
    <h2>Welcome Back</h2>
    <form id="signinForm" novalidate>
        <span class="error-message" id="loginError" style="margin-bottom: 1rem; text-align: center; font-size: 14px;"></span>

        <!-- Email -->
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="example@mail.com">
        </div>

        <!-- passward -->
        <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" required placeholder="Enter your password">
                <button class="toggle-btn" type="button">Show</button>
            </div>
        </div>

        <!-- Sign in button -->
        <button type="submit" class="btn">Sign In</button>
        
        <p class="redirect-link">
            Don't have an account? <a href="signup.html">Sign Up here</a>
        </p>
    </form>
</div>

<!-- script added -->
<script src="scrpt.js"></script>
</body>
</html>
